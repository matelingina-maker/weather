<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Weather Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(-45deg,#0f172a,#1e293b,#2563eb,#0ea5e9);
background-size:400% 400%;
animation:bg 15s ease infinite;
color:white;
padding:20px;
min-height:100vh;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:1100px;
margin:auto;
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.search{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#38bdf8;
color:white;
font-weight:bold;
}

button:hover{
background:#0ea5e9;
}

.current{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,.1);
padding:20px;
border-radius:15px;
}

.temp{
font-size:60px;
font-weight:bold;
}

#map{
height:350px;
border-radius:15px;
margin-top:20px;
}

.forecast{
margin-top:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

.forecast-card{
background:rgba(255,255,255,.1);
padding:15px;
border-radius:10px;
text-align:center;
}

@media(max-width:768px){

.current{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div class="container">

<h1>🌤 Advanced Weather Dashboard</h1>

<div class="search">
<input type="text" id="city" placeholder="Enter city name">
<button onclick="getWeather()">Search</button>
</div>

<div id="weather"></div>

<div id="map"></div>

<div id="forecast" class="forecast"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map;
let marker;

function weatherIcon(code){

if(code===0) return "☀️";
if(code<=3) return "⛅";
if(code<=48) return "☁️";
if(code<=67) return "🌧️";
if(code<=77) return "❄️";
if(code<=99) return "⛈️";

return "🌤️";
}

async function getWeather(){

const city=document.getElementById("city").value.trim();

if(!city){
alert("Enter a city");
return;
}

try{

const geoUrl=
`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`;

const geoRes=await fetch(geoUrl);
const geoData=await geoRes.json();

if(!geoData.results){

document.getElementById("weather").innerHTML=
"<h2>City not found</h2>";

return;
}

const place=geoData.results[0];

const lat=place.latitude;
const lon=place.longitude;

const weatherUrl=
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=auto`;

const weatherRes=await fetch(weatherUrl);
const data=await weatherRes.json();

const current=data.current;

document.getElementById("weather").innerHTML=`

<div class="current">

<div class="card">

<h2>${place.name}</h2>
<p>${place.country}</p>

<div class="temp">
${weatherIcon(current.weather_code)}
${current.temperature_2m}°C
</div>

<p>💧 Humidity: ${current.relative_humidity_2m}%</p>
<p>🌬 Wind: ${current.wind_speed_10m} km/h</p>

</div>

<div class="card">

<h3>Sun Information</h3>

<p>🌅 Sunrise:
${data.daily.sunrise[0].split("T")[1]}
</p>

<p>🌇 Sunset:
${data.daily.sunset[0].split("T")[1]}
</p>

<p>📍 Latitude:
${lat}
</p>

<p>📍 Longitude:
${lon}
</p>

</div>

</div>
`;

let forecastHTML="";

for(let i=0;i<7;i++){

forecastHTML+=`

<div class="forecast-card">

<h4>${data.daily.time[i]}</h4>

<h2>${weatherIcon(data.daily.weather_code[i])}</h2>

<p>${data.daily.temperature_2m_max[i]}°</p>

<p>${data.daily.temperature_2m_min[i]}°</p>

</div>

`;

}

document.getElementById("forecast").innerHTML=
forecastHTML;

if(!map){

map=L.map('map').setView([lat,lon],10);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

marker=L.marker([lat,lon]).addTo(map);

}else{

map.setView([lat,lon],10);

marker.setLatLng([lat,lon]);

}

marker.bindPopup(
`${place.name}, ${place.country}`
).openPopup();

}catch(error){

console.error(error);

document.getElementById("weather").innerHTML=
"<h2>Error loading weather data</h2>";

}

}

</script>

</body>
</html>
